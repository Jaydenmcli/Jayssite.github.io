<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Schedule Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{

background:#111;

color:white;

font-family:Arial;

}

.card{

margin:auto;

margin-top:40px;

width:900px;

max-width:95%;

background:#222;

padding:30px;

border-radius:15px;

}

.drop{

border:3px dashed #666;

padding:60px;

text-align:center;

border-radius:15px;

cursor:pointer;

transition:.3s;

}

.drop:hover{

background:#333;

}

img{

max-width:100%;

margin-top:20px;

display:none;

border-radius:10px;

}

pre{

background:#000;

padding:20px;

height:250px;

overflow:auto;

margin-top:20px;

}

.progress{

margin-top:20px;

display:none;

}

</style>

</head>

<body>

<div class="card">

<h2>Upload Schedule</h2>

<p>Choose the newest schedule image.</p>

<div class="drop" id="drop">

Click Here or Drag Image

<input

type="file"

id="file"

accept="image/*"

hidden>

</div>

<img id="preview">

<div class="progress">

<div

class="progress-bar"

id="bar"

style="width:0%">

0%

</div>

</div>

<pre id="output">

Waiting...

</pre>

<button

class="btn btn-success mt-3"

onclick="processImage()">

Read Schedule

</button>

</div>
